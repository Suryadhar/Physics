<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Periodic Table 3D</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<style>
:root {
  --bg: #030508;
  --surface: #080c14;
  --card: #0d1420;
  --border: #1a2540;
  --text: #c8d8f0;
  --muted: #4a5a7a;
  --accent: #00d4ff;
  --accent2: #ff6b35;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:'Rajdhani',sans-serif}
#app{display:flex;flex-direction:column;height:100vh;height:100dvh}
header{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0;z-index:10}
.logo{font-family:'Orbitron',monospace;font-size:14px;font-weight:900;background:linear-gradient(90deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:2px}
.hdr-info{font-size:11px;color:var(--muted);letter-spacing:1px}
.filters{display:flex;gap:5px;padding:8px 12px;overflow-x:auto;scrollbar-width:none;flex-shrink:0;background:var(--surface);border-bottom:1px solid var(--border)}
.filters::-webkit-scrollbar{display:none}
.pill{flex-shrink:0;padding:4px 10px;border-radius:100px;font-size:10px;font-weight:600;border:1px solid transparent;cursor:pointer;transition:all .2s;background:var(--card);color:var(--muted);letter-spacing:.5px;font-family:'Rajdhani',sans-serif}
.pill.active{color:#000}
.table-scroll{flex:1;overflow:auto;padding:8px 10px;scrollbar-width:thin;scrollbar-color:var(--border) transparent}
.table-wrap{display:grid;grid-template-columns:repeat(18,32px);grid-template-rows:repeat(10,32px);gap:2px;width:max-content}
.el{width:32px;height:32px;border-radius:4px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;border:1px solid #ffffff08;transition:all .15s;background:var(--card);position:relative}
.el:active{transform:scale(.9)}
.el .sym{font-family:'Orbitron',monospace;font-size:9px;font-weight:700;line-height:1}
.el .num{font-size:6px;color:rgba(255,255,255,.35);margin-top:1px}
.el.dim{opacity:.08}
.el.hi{transform:scale(1.08);z-index:2}
.el.selected{border-width:2px;transform:scale(1.1);z-index:3}
.sep-label{width:32px;height:32px;display:flex;align-items:center;justify-content:center;font-size:6px;color:var(--muted);text-align:center;line-height:1.3}
#overlay{position:fixed;inset:0;z-index:100;display:flex;flex-direction:column;opacity:0;pointer-events:none;transition:opacity .3s;background:#000000ee;backdrop-filter:blur(6px)}
#overlay.show{opacity:1;pointer-events:all}
#modal{display:flex;flex-direction:column;height:100%;transform:translateY(60px);transition:transform .35s cubic-bezier(.34,1.2,.64,1)}
#overlay.show #modal{transform:translateY(0)}
#canvas-wrap{position:relative;flex-shrink:0;height:52vh;background:radial-gradient(ellipse at center,#050d1a 0%,#030508 100%)}
#three-canvas{width:100%;height:100%;display:block;touch-action:none}
.hud{position:absolute;pointer-events:none}
.hud-tl{top:12px;left:14px}
.hud-bl{bottom:12px;left:14px}
.el-symbol-hud{font-family:'Orbitron',monospace;font-size:36px;font-weight:900;line-height:1;text-shadow:0 0 30px currentColor}
.el-num-hud{font-size:11px;opacity:.6;letter-spacing:1px;font-family:'Orbitron',monospace}
.el-name-hud{font-size:13px;font-weight:600;letter-spacing:2px;text-transform:uppercase;margin-top:2px}
.el-cat-hud{font-size:9px;opacity:.6;letter-spacing:2px;text-transform:uppercase;margin-top:2px}
.orbit-hint{font-size:9px;color:var(--muted);letter-spacing:1px}
.scan-line{position:absolute;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--accent),transparent);animation:scan 3s linear infinite;opacity:.3;pointer-events:none}
@keyframes scan{0%{top:0}100%{top:100%}}
#closeBtn{position:absolute;top:12px;right:16px;background:rgba(255,255,255,.08);border:1px solid var(--border);color:var(--muted);width:32px;height:32px;border-radius:50%;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;z-index:10;pointer-events:all}
#info-panel{flex:1;background:var(--surface);overflow-y:auto;border-top:1px solid var(--border)}
.info-scroll{padding:16px}
.particles-row{display:flex;gap:8px;margin-bottom:14px}
.p-card{flex:1;background:var(--card);border-radius:10px;padding:10px 12px;border:1px solid var(--border);text-align:center}
.p-count{font-family:'Orbitron',monospace;font-size:20px;font-weight:700}
.p-label{font-size:9px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-top:2px}
.proton-c{color:#ff4757}.neutron-c{color:#a0a0b0}.electron-c{color:#00d4ff}
.props-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:14px}
.prop{background:var(--card);border-radius:8px;padding:10px 12px;border:1px solid var(--border)}
.prop-l{font-size:9px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-bottom:3px}
.prop-v{font-size:14px;font-weight:600;font-family:'Orbitron',monospace}
.shells-visual{background:var(--card);border-radius:10px;padding:12px;margin-bottom:14px;border:1px solid var(--border)}
.shells-title{font-size:9px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-bottom:10px}
.shell-row{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.shell-label{font-family:'Orbitron',monospace;font-size:9px;color:var(--muted);width:16px}
.shell-dots{display:flex;gap:3px;flex-wrap:wrap;flex:1}
.shell-dot{width:8px;height:8px;border-radius:50%}
.shell-cap{font-size:9px;color:var(--muted)}
.el-desc{font-size:13px;line-height:1.7;color:#8090a8;padding:2px 0 20px}
</style>
</head>
<body>
<div id="app">
  <header>
    <div class="logo">ATOMICA</div>
    <div class="hdr-info">TAP ELEMENT FOR 3D VIEW</div>
  </header>
  <div class="filters" id="filters"></div>
  <div class="table-scroll">
    <div class="table-wrap" id="table"></div>
  </div>
</div>

<div id="overlay">
  <div id="modal">
    <div id="canvas-wrap">
      <canvas id="three-canvas"></canvas>
      <div class="scan-line"></div>
      <div class="hud hud-tl">
        <div class="el-symbol-hud" id="hud-sym">H</div>
        <div class="el-num-hud" id="hud-num">Z = 1</div>
        <div class="el-name-hud" id="hud-name">Hydrogen</div>
        <div class="el-cat-hud" id="hud-cat">Nonmetal</div>
      </div>
      <div class="hud hud-bl">
        <div class="orbit-hint">DRAG TO ROTATE</div>
      </div>
      <button id="closeBtn">X</button>
    </div>
    <div id="info-panel">
      <div class="info-scroll">
        <div class="particles-row">
          <div class="p-card"><div class="p-count proton-c" id="p-proton">1</div><div class="p-label">Protons</div></div>
          <div class="p-card"><div class="p-count neutron-c" id="p-neutron">0</div><div class="p-label">Neutrons</div></div>
          <div class="p-card"><div class="p-count electron-c" id="p-electron">1</div><div class="p-label">Electrons</div></div>
        </div>
        <div class="props-grid">
          <div class="prop"><div class="prop-l">Atomic Mass</div><div class="prop-v" id="pi-mass">-</div></div>
          <div class="prop"><div class="prop-l">Period / Group</div><div class="prop-v" id="pi-pg">-</div></div>
          <div class="prop"><div class="prop-l">State (STP)</div><div class="prop-v" id="pi-state">-</div></div>
          <div class="prop"><div class="prop-l">Electronegativity</div><div class="prop-v" id="pi-elec">-</div></div>
          <div class="prop"><div class="prop-l">Discovered</div><div class="prop-v" id="pi-year">-</div></div>
          <div class="prop"><div class="prop-l">Config</div><div class="prop-v" id="pi-cfg" style="font-size:10px">-</div></div>
        </div>
        <div class="shells-visual">
          <div class="shells-title">Electron Shell Distribution</div>
          <div id="shells-viz"></div>
        </div>
        <div class="el-desc" id="pi-desc"></div>
      </div>
    </div>
  </div>
</div>

function getShells(Z) {
  var maxShell = [2,8,18,32,32,18,8];
  var rem = Z, shells = [];
  for (var i = 0; i < maxShell.length && rem > 0; i++) {
    var n = Math.min(rem, maxShell[i]);
    shells.push(n); rem -= n;
  }
  return shells;
}

function getNeutrons(Z, mass) {
  var m = parseFloat(String(mass).replace(/[()]/g,""));
  return isNaN(m) ? Math.round(Z * 1.2) : Math.max(0, Math.round(m) - Z);
}

var renderer3, scene3, camera3, animFrame3;
var isDragging3=false, prevTouch3={x:0,y:0};
var atomGroup3, electronMeshes3=[], angleData3=[], speeds3=[], nucleusGroup3, nucleusLight3;
var threeInitialized=false;

function initThree(){
  var canvas = document.getElementById("three-canvas");
  var wrap = document.getElementById("canvas-wrap");
  renderer3 = new THREE.WebGLRenderer({canvas:canvas, antialias:true, alpha:true});
  renderer3.setPixelRatio(Math.min(window.devicePixelRatio,2));
  renderer3.setSize(wrap.clientWidth, wrap.clientHeight);

  scene3 = new THREE.Scene();
  camera3 = new THREE.PerspectiveCamera(50, wrap.clientWidth/wrap.clientHeight, 0.1, 1000);
  camera3.position.set(0, 0, 14);

  scene3.add(new THREE.AmbientLight(0xffffff, 0.4));
  var pl = new THREE.PointLight(0x00d4ff, 2, 60); pl.position.set(6,6,6); scene3.add(pl);
  var pl2 = new THREE.PointLight(0xff6b35, 1.5, 60); pl2.position.set(-6,-6,6); scene3.add(pl2);
  nucleusLight3 = new THREE.PointLight(0xffffff, 3, 12); scene3.add(nucleusLight3);

  atomGroup3 = new THREE.Group(); scene3.add(atomGroup3);

  canvas.addEventListener("mousedown", function(e){ isDragging3=true; prevTouch3={x:e.clientX,y:e.clientY}; });
  window.addEventListener("mouseup", function(){ isDragging3=false; });
  window.addEventListener("mousemove", function(e){
    if (!isDragging3) return;
    atomGroup3.rotation.y += (e.clientX-prevTouch3.x)*0.01;
    atomGroup3.rotation.x += (e.clientY-prevTouch3.y)*0.01;
    prevTouch3={x:e.clientX,y:e.clientY};
  });
  canvas.addEventListener("touchstart", function(e){ isDragging3=true; prevTouch3={x:e.touches[0].clientX,y:e.touches[0].clientY}; },{passive:true});
  canvas.addEventListener("touchend", function(){ isDragging3=false; });
  canvas.addEventListener("touchmove", function(e){
    if (!isDragging3) return;
    atomGroup3.rotation.y += (e.touches[0].clientX-prevTouch3.x)*0.013;
    atomGroup3.rotation.x += (e.touches[0].clientY-prevTouch3.y)*0.013;
    prevTouch3={x:e.touches[0].clientX,y:e.touches[0].clientY};
    e.preventDefault();
  },{passive:false});
}

function hexToInt(hex){ return parseInt(hex.replace("#",""),16); }

function buildAtom(Z, colorHex){
  while(atomGroup3.children.length) atomGroup3.remove(atomGroup3.children[0]);
  var toRemove=[];
  scene3.children.forEach(function(c){ if(c.isPoints) toRemove.push(c); });
  toRemove.forEach(function(c){ scene3.remove(c); });

  electronMeshes3=[]; angleData3=[]; speeds3=[];

  var shells = getShells(Z);
  var threeColor = new THREE.Color(colorHex);
  nucleusLight3.color.set(threeColor);

  // Nucleus
  nucleusGroup3 = new THREE.Group();
  var nR = Math.min(0.45 + Z*0.014, 2.0);

  var nGeo = new THREE.SphereGeometry(nR, 32, 32);
  var nMat = new THREE.MeshPhongMaterial({color:threeColor,emissive:threeColor,emissiveIntensity:0.5,transparent:true,opacity:0.85,shininess:60});
  nucleusGroup3.add(new THREE.Mesh(nGeo, nMat));

  // Protons and neutrons packed inside
  var neutrons = getNeutrons(Z, elMap[Z][6]);
  var showP = Math.min(Z,50), showN = Math.min(neutrons,50);
  for (var i=0; i<showP+showN; i++){
    var isP = (i < showP);
    var r2 = nR*0.72*Math.cbrt(Math.random());
    var th = Math.random()*Math.PI*2, ph = Math.acos(2*Math.random()-1);
    var pg = new THREE.SphereGeometry(nR*0.16, 8, 8);
    var pm = new THREE.MeshPhongMaterial({color:isP?0xff3344:0x7788aa,emissive:isP?0xaa1122:0x223344,emissiveIntensity:0.4,shininess:80});
    var pmesh = new THREE.Mesh(pg, pm);
    pmesh.position.set(r2*Math.sin(ph)*Math.cos(th), r2*Math.sin(ph)*Math.sin(th), r2*Math.cos(ph));
    nucleusGroup3.add(pmesh);
  }
  atomGroup3.add(nucleusGroup3);

  // Electron shells
  var tiltAngles=[
    {rx:Math.PI/2,ry:0},{rx:Math.PI/3,ry:Math.PI/5},{rx:Math.PI/4,ry:Math.PI/3},
    {rx:Math.PI/6,ry:Math.PI*0.7},{rx:Math.PI/2,ry:Math.PI/2},{rx:Math.PI*0.4,ry:Math.PI},{rx:Math.PI*0.6,ry:Math.PI*1.3}
  ];

  shells.forEach(function(count, si){
    var radius = nR + 1.7 + si*1.55;
    var tilt = tiltAngles[si] || {rx:Math.PI/2, ry:si*0.5};

    // Ring
    var rGeo = new THREE.TorusGeometry(radius, 0.015, 8, 128);
    var rMat = new THREE.MeshBasicMaterial({color:threeColor, transparent:true, opacity:0.3});
    var ring = new THREE.Mesh(rGeo, rMat);
    ring.rotation.x = tilt.rx; ring.rotation.y = tilt.ry;
    atomGroup3.add(ring);

    // Electrons on this shell
    for (var ei=0; ei<count; ei++){
      var eGeo = new THREE.SphereGeometry(0.13, 12, 12);
      var eMat = new THREE.MeshPhongMaterial({color:0x00d4ff, emissive:0x00aaff, emissiveIntensity:1, shininess:100});
      var eMesh = new THREE.Mesh(eGeo, eMat);
      // Glow halo around electron
      var gGeo = new THREE.SphereGeometry(0.26, 8, 8);
      var gMat = new THREE.MeshBasicMaterial({color:0x00d4ff, transparent:true, opacity:0.12});
      eMesh.add(new THREE.Mesh(gGeo, gMat));
      atomGroup3.add(eMesh);
      angleData3.push({angle:(2*Math.PI*ei)/count, radius:radius, rx:tilt.rx, ry:tilt.ry});
      speeds3.push(0.45/(si+1)*(0.85+Math.random()*0.3)*(Math.random()<0.5?1:-1));
      electronMeshes3.push(eMesh);
    }
  });

  // Background stars
  var sp = new Float32Array(300*3);
  for (var si2=0; si2<900; si2++) sp[si2]=(Math.random()-0.5)*70;
  var starGeo = new THREE.BufferGeometry();
  starGeo.setAttribute("position", new THREE.BufferAttribute(sp,3));
  scene3.add(new THREE.Points(starGeo, new THREE.PointsMaterial({color:0xffffff,size:0.07,transparent:true,opacity:0.35})));

  atomGroup3.rotation.x = 0.3; atomGroup3.rotation.y = 0.4;
}

function animateAtom(){
  animFrame3 = requestAnimationFrame(animateAtom);
  var t = Date.now()*0.001;
  if (nucleusGroup3){
    var s = 1 + Math.sin(t*2.5)*0.04;
    nucleusGroup3.scale.setScalar(s);
    nucleusLight3.intensity = 2.5 + Math.sin(t*3)*0.5;
  }
  electronMeshes3.forEach(function(em, i){
    var a = angleData3[i];
    a.angle += speeds3[i]*0.016;
    var x = Math.cos(a.angle)*a.radius;
    var y = Math.sin(a.angle)*a.radius;
    var cosX=Math.cos(a.rx), sinX=Math.sin(a.rx);
    var y2=y*cosX, z2=-y*sinX;
    var cosY=Math.cos(a.ry), sinY=Math.sin(a.ry);
    em.position.set(x*cosY+z2*sinY, y2, -x*sinY+z2*cosY);
  });
  if (!isDragging3) atomGroup3.rotation.y += 0.003;
  renderer3.render(scene3, camera3);
}

function openAtom(num){
  var e = elMap[num];

  document.getElementById("pi-mass").textContent = mass;
  document.getElementById("pi-pg").textContent = period+" / "+(group||"--");
  document.getElementById("pi-state").textContent = state;
  document.getElementById("pi-elec").textContent = elec;
  document.getElementById("pi-year").textContent = year;
  document.getElementById("pi-cfg").textContent = cfg;
  document.getElementById("pi-desc").textContent = desc;

  // Shell visualization
  var shViz = document.getElementById("shells-viz"); shViz.innerHTML="";
  var shellLabels=["K","L","M","N","O","P","Q"];
  var maxEach=[2,8,18,32,32,18,8];
  shells.forEach(function(cnt, i){
    var row2=document.createElement("div"); row2.className="shell-row";
    var lbl=document.createElement("div"); lbl.className="shell-label"; lbl.textContent=shellLabels[i];
    var dots=document.createElement("div"); dots.className="shell-dots";
    for(var d=0;d<cnt;d++){
      var dot=document.createElement("div"); dot.className="shell-dot";
      dot.style.background=color; dot.style.boxShadow="0 0 5px "+color;
      dots.appendChild(dot);
    }
    var cap=document.createElement("div"); cap.className="shell-cap"; cap.textContent=cnt+"/"+maxEach[i];
    row2.appendChild(lbl); row2.appendChild(dots); row2.appendChild(cap);
    shViz.appendChild(row2);
  });

  if (!threeInitialized){ initThree(); threeInitialized=true; }
  cancelAnimationFrame(animFrame3);
  buildAtom(n, color);
  animateAtom();

  document.querySelectorAll(".el").forEach(function(el){
    el.classList.toggle("selected", parseInt(el.dataset.num)===n);
  });
  document.getElementById("overlay").classList.add("show");
}

  cancelAnimationFrame(animFrame3);
  document.getElementById("overlay").classList.remove("show");
  document.querySelectorAll(".el").forEach(function(el){ el.classList.remove("selected"); });
}

  camera3.aspect=wrap.clientWidth/wrap.clientHeight;

  renderer3.setSize(wrap.clientWidth,wrap.clientHeight);
});
